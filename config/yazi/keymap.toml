[[mgr.prepend_keymap]]
on = ["<Tab>"]
run = "plugin toggle-pane max-preview"
desc = "Toggle preview pane"

[[mgr.prepend_keymap]]
on = ["<S-Tab>"]
run = "plugin toggle-pane min-preview"
desc = "Toggle preview pane"

[[mgr.prepend_keymap]]
on = ["<C-t>"]
run = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

[[mgr.prepend_keymap]]
on = ["p"]
run = "plugin smart-paste"
desc = "Paste into the hovered directory or CWD"

#[[mgr.prepend_keymap]]
#on   = [ "y", "p" ]
#run  = "shell 'printf \"%s\" $0 | pbcopy' --orphan"
#desc = "Copy path"

[[mgr.prepend_keymap]]
on = ["!"]
run = "shell --interactive"
desc = "Open $SHELL here"

[[mgr.prepend_keymap]]
on = ["c", "a", "a"]
run = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on = ["e", "t"]
run = "plugin eza-preview"
desc = "Toggle tree/list dir preview"

[[mgr.prepend_keymap]]
on = ["e", "-"]
run = "plugin eza-preview inc-level"
desc = "Increment tree level"

[[mgr.prepend_keymap]]
on = ["e", "_"]
run = "plugin eza-preview dec-level"
desc = "Decrement tree level"

[[mgr.prepend_keymap]]
on = ["e", "$"]
run = "plugin eza-preview toggle-follow-symlinks"
desc = "Toggle tree follow symlinks"

[[mgr.prepend_keymap]]
on = ["e", "*"]
run = "plugin eza-preview toggle-hidden"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on = ["e", "g", "i"]
run = "plugin eza-preview toggle-git-ignore"
desc = "Toggle .gitignore files"

[[mgr.prepend_keymap]]
on = ["e", "g", "s"]
run = "plugin eza-preview toggle-git-status"
desc = "Toggle showing git status"
